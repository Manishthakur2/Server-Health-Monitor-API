services:
  flask:
    image: flask-app:project-5
    ports:
      - "5000:5000"
    depends_on:
      - redis
    env_file:
      - .env
    networks:
      - backend
    restart: unless-stopped

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    networks:
      - backend
    restart: unless-stopped

networks:
  backend:
